name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install
        working-directory: ./frontend
        continue-on-error: true

      - name: Run Build
        run: npm run build
        working-directory: ./frontend
        continue-on-error: true

      - name: Run Tests
        run: npm test
        working-directory: ./frontend
        continue-on-error: true
